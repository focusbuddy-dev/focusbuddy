##
## tinyproxy configuration for focusbuddy devcontainer
## Level 1 network restriction: allowlist-based outbound filtering
##
## Runs as the unprivileged `node` user (not root) so reloads can use a plain
## `pkill -HUP tinyproxy` from the same user without sudo.
##

# Listen on localhost only
Port 8888
Listen 127.0.0.1

# Only allow connections from localhost
Allow 127.0.0.1

# Allowed destination ports (HTTP and HTTPS)
ConnectPort 443
ConnectPort 80

# Drop privileges to the `node` user (uid 1000 in the official node image).
# Both the bind socket (8888) and the listen address (127.0.0.1) are
# unprivileged, so no root capability is required at runtime.
User node
Group node

# Daemon mode is the default. Once tinyproxy forks, stdio is detached, so
# logs would not show up in the dev container output. Send them to a file
# under a node-writable directory instead. The Dockerfile creates and chowns
# /var/log/tinyproxy at build time.
LogFile "/var/log/tinyproxy/tinyproxy.log"
PidFile "/var/log/tinyproxy/tinyproxy.pid"
LogLevel Warning

# Filter configuration
# - Filter file contains one POSIX extended regex per line, matched against host
# - FilterDefaultDeny: block all hosts not matching the filter file
# - FilterExtended: use POSIX extended regex in filter file
# - FilterURLs off (default): match against host only, not full URL
Filter "/etc/tinyproxy/allowlist.txt"
FilterExtended On
FilterDefaultDeny Yes
