services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-focusbuddy}
      POSTGRES_USER: ${POSTGRES_USER:-focusbuddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-focusbuddy}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - focusbuddy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-focusbuddy} -d ${POSTGRES_DB:-focusbuddy}']
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: docker/local/node-dev.Dockerfile
    working_dir: /workspace
    command: ['node', 'scripts/local-dev/auth-stub.mjs']
    environment:
      PORT: 9099
      FOCUSBUDDY_AUTH_MODE: ${FOCUSBUDDY_AUTH_MODE:-stub}
    volumes:
      - ${FOCUSBUDDY_WORKSPACE_MOUNT:-.}:/workspace
    ports:
      - '${AUTH_PORT:-9099}:9099'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:9099/health').then((response)=>{if(!response.ok) process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  focusbuddy-postgres-data:

networks:
  default:
    name: focusbuddy-net
    external: true
