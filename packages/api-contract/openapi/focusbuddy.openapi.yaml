openapi: 3.1.0
info:
  title: FocusBuddy API
  version: 0.1.0
  summary: First schema-driven contract baseline for the FocusBuddy MVP.
  description: |
    This contract is the source of truth for the initial FocusBuddy API surface.

    It models the first target, session, stamp, and public-summary workflows from the MVP domain notes.
servers:
  - url: https://api.focusbuddy.example
    description: Placeholder production server
  - url: http://localhost:3000
    description: Placeholder local API server
tags:
  - name: Targets
  - name: Sessions
  - name: PublicSummary
  - name: Stamps
security:
  - bearerAuth: []
paths:
  /v1/targets:
    get:
      tags: [Targets]
      operationId: listFocusTargets
      summary: List the authenticated user's focus targets.
      responses:
        '200':
          description: Focus targets owned by the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FocusTargetListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
    post:
      tags: [Targets]
      operationId: createFocusTarget
      summary: Create a new focus target.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFocusTargetInput'
      responses:
        '201':
          description: The created target.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FocusTarget'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /v1/targets/{targetId}:
    parameters:
      - $ref: '#/components/parameters/TargetId'
    get:
      tags: [Targets]
      operationId: getFocusTarget
      summary: Fetch one focus target.
      responses:
        '200':
          description: The requested focus target.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FocusTarget'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
    patch:
      tags: [Targets]
      operationId: updateFocusTarget
      summary: Update mutable target fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFocusTargetInput'
      responses:
        '200':
          description: The updated target.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FocusTarget'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /v1/targets/{targetId}/sessions:
    parameters:
      - $ref: '#/components/parameters/TargetId'
    get:
      tags: [Sessions]
      operationId: listFocusSessions
      summary: List sessions for a focus target.
      responses:
        '200':
          description: Sessions linked to the target.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FocusSessionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
    post:
      tags: [Sessions]
      operationId: createFocusSession
      summary: Create a new focus session for a target.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFocusSessionInput'
      responses:
        '201':
          description: The created session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FocusSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ConflictError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /v1/public/targets/{targetId}/summary:
    parameters:
      - $ref: '#/components/parameters/TargetId'
    get:
      tags: [PublicSummary]
      operationId: getPublicTargetSummary
      summary: Read the derived public summary for a focus target.
      security: []
      responses:
        '200':
          description: The current public summary state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicTargetSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /v1/public/targets/{targetId}/stamps/helpful:
    parameters:
      - $ref: '#/components/parameters/TargetId'
    put:
      tags: [Stamps]
      operationId: upsertHelpfulStamp
      summary: Upsert the effective helpful stamp for the current actor.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertHelpfulStampInput'
      responses:
        '200':
          description: The effective helpful stamp after the upsert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stamp'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Placeholder bearer token scheme for authenticated API endpoints.
  parameters:
    TargetId:
      name: targetId
      in: path
      required: true
      description: Stable identifier of a focus target.
      schema:
        type: string
        minLength: 1
  responses:
    BadRequest:
      description: The request payload did not satisfy the contract.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          examples:
            invalidPayload:
              summary: The payload failed contract validation.
              value:
                code: VALIDATION_ERROR
                message: Request validation failed.
                requestId: req_01HZX8BADREQUEST
                retryable: false
                details:
                  kind: validation
                  issues:
                    - field: body.noteVisibility
                      reason: invalid_enum_value
                      message: noteVisibility must be PRIVATE or PUBLIC.
    UnauthorizedError:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedErrorResponse'
          examples:
            missingAuth:
              summary: The caller must authenticate first.
              value:
                code: AUTH_REQUIRED
                message: Authentication is required.
                requestId: req_01HZX8UNAUTHORIZED
                retryable: false
    ForbiddenError:
      description: The caller is authenticated but not allowed to perform the action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenErrorResponse'
          examples:
            ownerOnlyMutation:
              summary: The resource is visible, but mutation is forbidden.
              value:
                code: ACCESS_DENIED
                message: You are not allowed to perform this action.
                requestId: req_01HZX8FORBIDDEN
                retryable: false
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundErrorResponse'
          examples:
            hiddenOrMissing:
              summary: The resource does not exist or is not disclosed.
              value:
                code: RESOURCE_NOT_FOUND
                message: The requested resource was not found.
                requestId: req_01HZX8NOTFOUND
                retryable: false
    ConflictError:
      description: The action conflicts with current resource state or domain rules.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictErrorResponse'
          examples:
            summaryPrerequisite:
              summary: Summary publication prerequisites are not satisfied.
              value:
                code: INVALID_STATE_TRANSITION
                message: The requested action is not allowed from the current state.
                requestId: req_01HZX8CONFLICT1
                retryable: false
                details:
                  kind: conflict
                  reason: SUMMARY_PREREQUISITE_NOT_MET
                  currentState: draft
            noteVisibilityRule:
              summary: Note visibility exceeds session visibility.
              value:
                code: DOMAIN_RULE_VIOLATION
                message: The request violates a domain rule.
                requestId: req_01HZX8CONFLICT2
                retryable: false
                details:
                  kind: conflict
                  reason: NOTE_VISIBILITY_EXCEEDS_SESSION
                  currentState: session_private
    TooManyRequestsError:
      description: The caller hit a temporary rate limit.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitErrorResponse'
          examples:
            stampRateLimit:
              summary: Helpful stamp action is temporarily throttled.
              value:
                code: RATE_LIMITED
                message: Too many requests. Please retry later.
                requestId: req_01HZX8RATELIMIT
                retryable: true
                details:
                  kind: rate_limit
                  retryAfterSeconds: 30
                  scope: stamp
    ServiceUnavailableError:
      description: A required upstream dependency is temporarily unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServiceUnavailableErrorResponse'
          examples:
            authProviderUnavailable:
              summary: A required dependency is currently unavailable.
              value:
                code: UPSTREAM_UNAVAILABLE
                message: A required service is temporarily unavailable.
                requestId: req_01HZX8UNAVAILABLE
                retryable: true
    InternalServerError:
      description: An unexpected server failure occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InternalErrorResponse'
          examples:
            unexpectedFailure:
              summary: Unexpected server-side failure.
              value:
                code: INTERNAL_ERROR
                message: An unexpected error occurred.
                requestId: req_01HZX8INTERNAL
                retryable: false
  schemas:
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - AUTH_REQUIRED
        - ACCESS_DENIED
        - RESOURCE_NOT_FOUND
        - INVALID_STATE_TRANSITION
        - DOMAIN_RULE_VIOLATION
        - DUPLICATE_RESOURCE
        - RATE_LIMITED
        - UPSTREAM_UNAVAILABLE
        - INTERNAL_ERROR
    ConflictReason:
      type: string
      enum:
        - INVALID_VISIBILITY_TRANSITION
        - SUMMARY_PREREQUISITE_NOT_MET
        - NOTE_VISIBILITY_EXCEEDS_SESSION
        - RESOURCE_ALREADY_EXISTS
    ValidationIssue:
      type: object
      additionalProperties: false
      required:
        - field
        - reason
        - message
      properties:
        field:
          type: string
          description: Logical input path such as body.note or query.limit.
        reason:
          type: string
          description: Stable machine-readable validation reason.
        message:
          type: string
          description: Safe field-level message.
    ValidationErrorDetails:
      type: object
      additionalProperties: false
      required:
        - kind
        - issues
      properties:
        kind:
          type: string
          enum: [validation]
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
    ConflictErrorDetails:
      type: object
      additionalProperties: false
      required:
        - kind
      properties:
        kind:
          type: string
          enum: [conflict]
        reason:
          $ref: '#/components/schemas/ConflictReason'
        currentState:
          type: string
          description: Optional public-safe current state label.
    RateLimitErrorDetails:
      type: object
      additionalProperties: false
      required:
        - kind
      properties:
        kind:
          type: string
          enum: [rate_limit]
        retryAfterSeconds:
          type: integer
          minimum: 0
        scope:
          type: string
          description: Optional public-safe rate-limit scope such as stamp or session-create.
    TargetSourceType:
      type: string
      enum: [FREE_FORM, URL]
    SessionVisibility:
      type: string
      enum: [PRIVATE, PUBLIC]
    NoteVisibility:
      type: string
      enum: [PRIVATE, PUBLIC]
    StampType:
      type: string
      enum: [HELPFUL]
    StampActorType:
      type: string
      enum: [AUTHENTICATED_USER, ANONYMOUS_VISITOR]
    UserRef:
      type: object
      additionalProperties: false
      required: [id, firebaseUid]
      properties:
        id:
          type: string
        firebaseUid:
          type: string
    FocusTarget:
      type: object
      additionalProperties: false
      required:
        - id
        - owner
        - title
        - sourceType
        - publicSummaryEnabled
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        owner:
          $ref: '#/components/schemas/UserRef'
        title:
          type: string
        sourceType:
          $ref: '#/components/schemas/TargetSourceType'
        sourceUrl:
          type:
            - string
            - 'null'
          format: uri
        genre:
          type:
            - string
            - 'null'
        publicSummaryEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PublicFocusTarget:
      type: object
      additionalProperties: false
      required:
        - title
        - sourceType
      properties:
        title:
          type: string
        sourceType:
          $ref: '#/components/schemas/TargetSourceType'
        sourceUrl:
          type:
            - string
            - 'null'
          format: uri
        genre:
          type:
            - string
            - 'null'
    CreateFocusTargetInput:
      type: object
      additionalProperties: false
      required: [title, sourceType]
      properties:
        title:
          type: string
          minLength: 1
        sourceType:
          $ref: '#/components/schemas/TargetSourceType'
        sourceUrl:
          type:
            - string
            - 'null'
          format: uri
        genre:
          type:
            - string
            - 'null'
        publicSummaryEnabled:
          type: boolean
          default: false
    UpdateFocusTargetInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
        sourceUrl:
          type:
            - string
            - 'null'
          format: uri
        genre:
          type:
            - string
            - 'null'
        publicSummaryEnabled:
          type: boolean
    FocusSession:
      type: object
      additionalProperties: false
      required:
        - id
        - targetId
        - visibility
        - completedByUser
        - startedAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        targetId:
          type: string
        visibility:
          $ref: '#/components/schemas/SessionVisibility'
        note:
          type:
            - string
            - 'null'
        noteVisibility:
          oneOf:
            - $ref: '#/components/schemas/NoteVisibility'
            - type: 'null'
        completedByUser:
          type: boolean
        startedAt:
          type: string
          format: date-time
        endedAt:
          type:
            - string
            - 'null'
          format: date-time
        durationSeconds:
          type:
            - integer
            - 'null'
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resumeSource:
          oneOf:
            - $ref: '#/components/schemas/ResumeSource'
            - type: 'null'
    CreateFocusSessionInput:
      type: object
      additionalProperties: false
      required: [visibility, completedByUser, startedAt]
      properties:
        visibility:
          $ref: '#/components/schemas/SessionVisibility'
        note:
          type:
            - string
            - 'null'
        noteVisibility:
          oneOf:
            - $ref: '#/components/schemas/NoteVisibility'
            - type: 'null'
        completedByUser:
          type: boolean
        startedAt:
          type: string
          format: date-time
        endedAt:
          type:
            - string
            - 'null'
          format: date-time
        durationSeconds:
          type:
            - integer
            - 'null'
          minimum: 0
        resumeFromSessionId:
          type:
            - string
            - 'null'
    ResumeSource:
      type: object
      additionalProperties: false
      required:
        - id
        - targetId
        - startedSessionId
        - previousSessionId
        - isEffective
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        targetId:
          type: string
        startedSessionId:
          type: string
        previousSessionId:
          type: string
        isEffective:
          type: boolean
        invalidatedAt:
          type:
            - string
            - 'null'
          format: date-time
        invalidationNote:
          type:
            - string
            - 'null'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Stamp:
      type: object
      additionalProperties: false
      required:
        - id
        - targetId
        - actorType
        - actorKey
        - stampType
        - isEffective
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        targetId:
          type: string
        actorType:
          $ref: '#/components/schemas/StampActorType'
        actorKey:
          type: string
        actorUserId:
          type:
            - string
            - 'null'
        stampType:
          $ref: '#/components/schemas/StampType'
        isEffective:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpsertHelpfulStampInput:
      type: object
      additionalProperties: false
      required: [isEffective]
      properties:
        isEffective:
          type: boolean
    PublicSessionSummary:
      type: object
      additionalProperties: false
      required: [sessionId, startedAt, durationSeconds, completedByUser]
      properties:
        sessionId:
          type: string
        startedAt:
          type: string
          format: date-time
        durationSeconds:
          type: integer
          minimum: 0
        completedByUser:
          type: boolean
        publicNote:
          type:
            - string
            - 'null'
    PublicTargetSummary:
      type: object
      additionalProperties: false
      required:
        - target
        - publicSessionCount
        - totalPublicDurationSeconds
        - helpfulStampCount
        - recentPublicSessions
      properties:
        target:
          $ref: '#/components/schemas/PublicFocusTarget'
        publicSessionCount:
          type: integer
          minimum: 0
        totalPublicDurationSeconds:
          type: integer
          minimum: 0
        lastPublicSessionAt:
          type:
            - string
            - 'null'
          format: date-time
        helpfulStampCount:
          type: integer
          minimum: 0
        recentPublicSessions:
          type: array
          items:
            $ref: '#/components/schemas/PublicSessionSummary'
    FocusTargetListResponse:
      type: object
      additionalProperties: false
      required: [targets]
      properties:
        targets:
          type: array
          items:
            $ref: '#/components/schemas/FocusTarget'
    FocusSessionListResponse:
      type: object
      additionalProperties: false
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/FocusSession'
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
        - retryable
        - details
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR]
        message:
          type: string
          description: Safe human-readable summary intended for direct client use.
        requestId:
          type: string
          description: Correlation ID copied into server logs and support tooling.
        retryable:
          type: boolean
          enum: [false]
          description: Validation failures must be corrected before retry.
        details:
          $ref: '#/components/schemas/ValidationErrorDetails'
    UnauthorizedErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
        - retryable
      properties:
        code:
          type: string
          enum: [AUTH_REQUIRED]
        message:
          type: string
          description: Safe human-readable summary intended for direct client use.
        requestId:
          type: string
          description: Correlation ID copied into server logs and support tooling.
        retryable:
          type: boolean
          enum: [false]
          description: Authentication context must change before retry.
    ForbiddenErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
        - retryable
      properties:
        code:
          type: string
          enum: [ACCESS_DENIED]
        message:
          type: string
          description: Safe human-readable summary intended for direct client use.
        requestId:
          type: string
          description: Correlation ID copied into server logs and support tooling.
        retryable:
          type: boolean
          enum: [false]
          description: Permission must change before retry.
    NotFoundErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
        - retryable
      properties:
        code:
          type: string
          enum: [RESOURCE_NOT_FOUND]
        message:
          type: string
          description: Safe human-readable summary intended for direct client use.
        requestId:
          type: string
          description: Correlation ID copied into server logs and support tooling.
        retryable:
          type: boolean
          enum: [false]
          description: Missing or hidden resources should not be retried immediately.
    ConflictErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
        - retryable
      properties:
        code:
          type: string
          enum:
            - INVALID_STATE_TRANSITION
            - DOMAIN_RULE_VIOLATION
            - DUPLICATE_RESOURCE
        message:
          type: string
          description: Safe human-readable summary intended for direct client use.
        requestId:
          type: string
          description: Correlation ID copied into server logs and support tooling.
        retryable:
          type: boolean
          enum: [false]
          description: Conflict failures require state or input change before retry.
        details:
          $ref: '#/components/schemas/ConflictErrorDetails'
    RateLimitErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
        - retryable
        - details
      properties:
        code:
          type: string
          enum: [RATE_LIMITED]
        message:
          type: string
          description: Safe human-readable summary intended for direct client use.
        requestId:
          type: string
          description: Correlation ID copied into server logs and support tooling.
        retryable:
          type: boolean
          enum: [true]
          description: Rate-limited requests may be retried after cooldown.
        details:
          $ref: '#/components/schemas/RateLimitErrorDetails'
    ServiceUnavailableErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
        - retryable
      properties:
        code:
          type: string
          enum: [UPSTREAM_UNAVAILABLE]
        message:
          type: string
          description: Safe human-readable summary intended for direct client use.
        requestId:
          type: string
          description: Correlation ID copied into server logs and support tooling.
        retryable:
          type: boolean
          enum: [true]
          description: Temporary dependency failures may be retried.
    InternalErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
        - retryable
      properties:
        code:
          type: string
          enum: [INTERNAL_ERROR]
        message:
          type: string
          description: Safe human-readable summary intended for direct client use.
        requestId:
          type: string
          description: Correlation ID copied into server logs and support tooling.
        retryable:
          type: boolean
          enum: [false]
          description: Unknown failures should not assume safe immediate retry.
    ErrorResponse:
      description: Backward-compatible generic error shape kept during the transition to typed error responses.
      oneOf:
        - $ref: '#/components/schemas/ValidationErrorResponse'
